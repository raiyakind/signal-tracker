name: Poll Congressional Trades

on:
  schedule:
    # Runs every 15 minutes during US market hours Mon-Fri
    - cron: '*/15 13-21 * * 1-5'
  workflow_dispatch: # allow manual trigger

jobs:
  poll:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Poll and filter trades
        run: python .github/scripts/poll_trades.py

      - name: Commit updated trades.json if changed
        run: |
          git config user.name  "Signal Bot"
          git config user.email "bot@signal-tracker.app"
          git add trades.json
          git diff --staged --quiet || git commit -m "chore: update trades $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
