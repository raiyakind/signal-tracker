<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal â Congressional Trade Intelligence</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; color: #111; min-height: 100vh; }

  /* Header */
  .header { background: #111; color: #fff; padding: 18px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .header-sub { color: #9ca3af; font-size: 13px; }
  .last-updated { color: #6b7280; font-size: 12px; }

  /* Add pilot */
  .add-pilot-wrap { position: relative; }
  .add-pilot-input { background: #222; border: 1px solid #333; color: #fff; padding: 8px 14px; border-radius: 8px; font-size: 13px; width: 220px; outline: none; }
  .add-pilot-input::placeholder { color: #6b7280; }
  .add-pilot-input:focus { border-color: #555; }
  .pilot-dropdown { position: absolute; top: calc(100% + 4px); right: 0; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; min-width: 260px; overflow: hidden; z-index: 200; display: none; }
  .pilot-dropdown.open { display: block; }
  .pilot-option { padding: 11px 16px; cursor: pointer; font-size: 14px; border-bottom: 1px solid #222; }
  .pilot-option:last-child { border-bottom: none; }
  .pilot-option:hover { background: #252525; }
  .pilot-option .p-name { font-weight: 600; color: #fff; }
  .pilot-option .p-meta { color: #6b7280; font-size: 12px; margin-top: 2px; }

  /* Main layout */
  .main { max-width: 960px; margin: 0 auto; padding: 28px 20px; }

  /* Filter bar */
  .filters { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
  .filter-btn { background: #fff; border: 1px solid #e5e7eb; border-radius: 20px; padding: 6px 16px; font-size: 13px; cursor: pointer; transition: all 0.15s; color: #374151; }
  .filter-btn:hover, .filter-btn.active { background: #111; color: #fff; border-color: #111; }
  .trade-count { margin-left: auto; color: #9ca3af; font-size: 13px; }

  /* Trade cards */
  .trades-grid { display: flex; flex-direction: column; gap: 12px; }

  .trade-card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    padding: 16px 20px;
    cursor: pointer;
    transition: box-shadow 0.15s, transform 0.1s;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: start;
  }
  .trade-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-1px); }
  .trade-card.is-new { border-left: 3px solid #2563eb; }

  .card-left { display: flex; flex-direction: column; gap: 6px; }
  .card-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .pilot-name { font-weight: 700; font-size: 14px; color: #111; }
  .ticker { font-size: 20px; font-weight: 800; color: #111; }
  .company { font-size: 13px; color: #6b7280; font-weight: 400; }
  .card-meta { font-size: 12px; color: #9ca3af; display: flex; gap: 12px; flex-wrap: wrap; }
  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }

  .badge { display: inline-block; border-radius: 5px; padding: 2px 9px; font-size: 11px; font-weight: 600; }
  .badge-buy { background: #dcfce7; color: #15803d; }
  .badge-sell { background: #fee2e2; color: #dc2626; }
  .badge-call { background: #dbeafe; color: #1d4ed8; }
  .badge-put { background: #fef3c7; color: #92400e; }
  .badge-exchange { background: #f3e8ff; color: #7c3aed; }
  .badge-values { background: #dbeafe; color: #1e40af; }
  .badge-infra { background: #f0fdf4; color: #166534; }
  .badge-new { background: #eff6ff; color: #2563eb; }

  .card-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .amount { font-size: 15px; font-weight: 700; color: #111; }
  .analysis-hint { font-size: 11px; color: #9ca3af; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
  .analysis-dot { width: 6px; height: 6px; border-radius: 50%; background: #2563eb; }

  /* Loading / empty states */
  .loading { text-align: center; padding: 60px; color: #9ca3af; font-size: 15px; }
  .empty { text-align: center; padding: 60px 20px; color: #9ca3af; }
  .empty h3 { font-size: 18px; margin-bottom: 8px; color: #374151; }

  /* Analysis panel */
  .analysis-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .analysis-overlay.open { opacity: 1; pointer-events: all; }

  .analysis-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 440px; max-width: 95vw;
    background: #fff;
    z-index: 400;
    transform: translateX(100%);
    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex; flex-direction: column;
    box-shadow: -4px 0 32px rgba(0,0,0,0.12);
  }
  .analysis-panel.open { transform: translateX(0); }

  .panel-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid #e5e7eb;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }
  .panel-ticker { font-size: 26px; font-weight: 800; }
  .panel-company { font-size: 14px; color: #6b7280; margin-top: 2px; }
  .panel-pilot { font-size: 13px; font-weight: 600; color: #374151; margin-top: 6px; }
  .panel-close { background: none; border: none; cursor: pointer; color: #9ca3af; font-size: 22px; line-height: 1; padding: 2px; flex-shrink: 0; }
  .panel-close:hover { color: #374151; }

  .panel-trade-info { padding: 16px 24px; background: #f9fafb; border-bottom: 1px solid #e5e7eb; display: flex; gap: 20px; flex-wrap: wrap; }
  .panel-info-item { display: flex; flex-direction: column; gap: 2px; }
  .panel-info-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #9ca3af; }
  .panel-info-value { font-size: 14px; font-weight: 600; color: #111; }

  .panel-body { flex: 1; overflow-y: auto; padding: 24px; }
  .panel-analysis-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #9ca3af; margin-bottom: 14px; }
  .panel-analysis-text { font-size: 14px; line-height: 1.75; color: #374151; }
  .panel-analysis-text p { margin-bottom: 14px; }
  .panel-analysis-text p:last-child { margin-bottom: 0; }
  .no-analysis { color: #9ca3af; font-size: 14px; font-style: italic; }

  @media (max-width: 600px) {
    .header { padding: 14px 16px; flex-wrap: wrap; gap: 10px; }
    .add-pilot-input { width: 160px; }
    .main { padding: 16px 12px; }
    .trade-card { grid-template-columns: 1fr; }
    .card-right { align-items: flex-start; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">Signal</div>
    <div class="header-sub">Congressional trading intelligence</div>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <div class="last-updated" id="last-updated"></div>
    <div class="add-pilot-wrap">
      <input class="add-pilot-input" id="pilot-search" placeholder="+ Add pilotâ¦" oninput="searchPilots(this.value)" onfocus="searchPilots(this.value)" autocomplete="off">
      <div class="pilot-dropdown" id="pilot-dropdown"></div>
    </div>
  </div>
</header>

<div class="main">
  <div class="filters" id="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All trades</button>
    <button class="filter-btn" onclick="setFilter('buy', this)">Buys</button>
    <button class="filter-btn" onclick="setFilter('sell', this)">Sells</button>
    <button class="filter-btn" onclick="setFilter('new', this)">New</button>
    <button class="filter-btn" onclick="setFilter('infra', this)">Infra</button>
    <div class="trade-count" id="trade-count"></div>
  </div>
  <div class="trades-grid" id="trades-grid">
    <div class="loading">Loading tradesâ¦</div>
  </div>
</div>

<!-- Analysis overlay + panel -->
<div class="analysis-overlay" id="analysis-overlay" onclick="closeAnalysis()"></div>
<div class="analysis-panel" id="analysis-panel">
  <div class="panel-header">
    <div>
      <div class="panel-ticker" id="panel-ticker"></div>
      <div class="panel-company" id="panel-company"></div>
      <div class="panel-pilot" id="panel-pilot"></div>
    </div>
    <button class="panel-close" onclick="closeAnalysis()">â</button>
  </div>
  <div class="panel-trade-info" id="panel-trade-info"></div>
  <div class="panel-body">
    <div class="panel-analysis-title">AI Analysis</div>
    <div class="panel-analysis-text" id="panel-analysis"></div>
  </div>
</div>

<script>
const TRADES_URL = 'https://raw.githubusercontent.com/raiyakind/signal-tracker/main/trades.json';

// Known politicians for search
const KNOWN_PILOTS = [
  { id: 'K000389', key: 'khanna', name: 'Ro Khanna', party: 'D', state: 'CA', chamber: 'House' },
  { id: 'S001185', key: 'sewell', name: 'Terri Sewell', party: 'D', state: 'AL', chamber: 'House' },
  { id: 'M001153', key: 'murkowski', name: 'Lisa Murkowski', party: 'R', state: 'AK', chamber: 'Senate' },
  { id: 'M001136', key: 'mcclain', name: 'Lisa McClain', party: 'R', state: 'MI', chamber: 'House' },
  { id: 'P000197', key: 'pelosi', name: 'Nancy Pelosi', party: 'D', state: 'CA', chamber: 'House' },
  { id: 'B001291', key: 'babin', name: 'Brian Babin', party: 'R', state: 'TX', chamber: 'House' },
  { id: 'G000596', key: 'greene', name: 'Marjorie Taylor Greene', party: 'R', state: 'GA', chamber: 'House' },
];

let allTrades = [];
let activePilots = new Set();
let currentFilter = 'all';

// Pilot name map (updated from data)
const pilotNames = {
  khanna: 'Ro Khanna', sewell: 'Terri Sewell',
  murkowski: 'Lisa Murkowski', mcclain: 'Lisa McClain',
};

async function init() {
  try {
    const res = await fetch(TRADES_URL + '?_=' + Date.now());
    const data = await res.json();

    // Handle both formats: array or {trades:[...]}
    const trades = Array.isArray(data) ? data : (data.trades || []);
    allTrades = trades;

    // Update last updated
    const ts = data.lastUpdated || data.last_updated;
    if (ts) {
      const d = new Date(ts);
      document.getElementById('last-updated').textContent = 'Updated ' + d.toLocaleDateString('en-US', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    }

    // Collect active pilots
    trades.forEach(t => { if (t.pilot) activePilots.add(t.pilot); });

    renderTrades();
  } catch (e) {
    document.getElementById('trades-grid').innerHTML = '<div class="empty"><h3>Could not load trades</h3><p>' + e.message + '</p></div>';
  }
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTrades();
}

function renderTrades() {
  let trades = allTrades;

  if (currentFilter === 'buy') trades = trades.filter(t => t.type === 'buy');
  else if (currentFilter === 'sell') trades = trades.filter(t => t.type === 'sell');
  else if (currentFilter === 'new') trades = trades.filter(t => t.isNew);
  else if (currentFilter === 'infra') trades = trades.filter(t => t.infra);

  document.getElementById('trade-count').textContent = trades.length + ' trades';

  if (!trades.length) {
    document.getElementById('trades-grid').innerHTML = '<div class="empty"><h3>No trades match</h3></div>';
    return;
  }

  const grid = document.getElementById('trades-grid');
  grid.innerHTML = trades.map(t => tradeCard(t)).join('');
}

function typeBadge(type) {
  const cls = { buy:'badge-buy', sell:'badge-sell', call:'badge-call', put:'badge-put', exchange:'badge-exchange' }[type] || 'badge-buy';
  return `<span class="badge ${cls}">${type.toUpperCase()}</span>`;
}

function pilotDisplay(key) {
  return pilotNames[key] || key;
}

function tradeCard(t) {
  const tags = [];
  if (t.isNew) tags.push('<span class="badge badge-new">New</span>');
  if (t.values) tags.push(`<span class="badge badge-values">${t.values}</span>`);
  if (t.infra) tags.push('<span class="badge badge-infra">Infra</span>');

  const hasAnalysis = t.analysis && t.analysis.trim().length > 0;
  const analysisHint = hasAnalysis
    ? '<div class="analysis-hint"><div class="analysis-dot"></div>AI analysis</div>'
    : '<div class="analysis-hint">Tap to view</div>';

  return `<div class="trade-card${t.isNew ? ' is-new' : ''}" onclick="openAnalysis(${JSON.stringify(JSON.stringify(t))})">
    <div class="card-left">
      <div class="card-top">
        ${typeBadge(t.type)}
        <span class="ticker">${t.ticker}</span>
        <span class="company">${t.company || ''}</span>
      </div>
      <div style="font-size:13px;color:#6b7280;font-weight:500">${pilotDisplay(t.pilot)}</div>
      <div class="card-meta">
        <span>Traded ${t.transDate || 'â'}</span>
        <span>Filed ${t.filedDate || 'â'}</span>
        <span style="text-transform:capitalize">${t.chamber || ''}</span>
      </div>
      ${tags.length ? '<div class="card-tags">' + tags.join('') + '</div>' : ''}
    </div>
    <div class="card-right">
      <div class="amount">${t.amount || 'â'}</div>
      ${analysisHint}
    </div>
  </div>`;
}

function openAnalysis(tradeJson) {
  const t = JSON.parse(tradeJson);

  document.getElementById('panel-ticker').textContent = t.ticker;
  document.getElementById('panel-company').textContent = t.company || '';
  document.getElementById('panel-pilot').textContent = pilotDisplay(t.pilot) + (t.chamber ? ' Â· ' + t.chamber : '');

  document.getElementById('panel-trade-info').innerHTML = `
    <div class="panel-info-item"><div class="panel-info-label">Action</div><div class="panel-info-value" style="color:${t.type==='buy'?'#15803d':'#dc2626'}">${(t.type||'').toUpperCase()}</div></div>
    <div class="panel-info-item"><div class="panel-info-label">Amount</div><div class="panel-info-value">${t.amount || 'â'}</div></div>
    <div class="panel-info-item"><div class="panel-info-label">Traded</div><div class="panel-info-value">${t.transDate || 'â'}</div></div>
    <div class="panel-info-item"><div class="panel-info-label">Filed</div><div class="panel-info-value">${t.filedDate || 'â'}</div></div>
    ${t.values ? `<div class="panel-info-item"><div class="panel-info-label">Signal</div><div class="panel-info-value" style="color:#1e40af">${t.values}</div></div>` : ''}
  `;

  const analysisEl = document.getElementById('panel-analysis');
  if (t.analysis && t.analysis.trim()) {
    const paras = t.analysis.trim().split(/\n\n+/);
    analysisEl.innerHTML = paras.map(p => `<p>${p.replace(/\n/g,' ')}</p>`).join('');
  } else {
    analysisEl.innerHTML = '<div class="no-analysis">Analysis not available for this trade.</div>';
  }

  document.getElementById('analysis-overlay').classList.add('open');
  document.getElementById('analysis-panel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeAnalysis() {
  document.getElementById('analysis-overlay').classList.remove('open');
  document.getElementById('analysis-panel').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAnalysis(); });

// Pilot search
function searchPilots(q) {
  const dropdown = document.getElementById('pilot-dropdown');
  if (!q || q.trim().length < 1) { dropdown.classList.remove('open'); return; }
  const matches = KNOWN_PILOTS.filter(p =>
    p.name.toLowerCase().includes(q.toLowerCase()) ||
    p.key.includes(q.toLowerCase())
  ).filter(p => !activePilots.has(p.key));

  if (!matches.length) { dropdown.classList.remove('open'); return; }

  dropdown.innerHTML = matches.map(p => `
    <div class="pilot-option" onclick="addPilot('${p.key}','${p.name}')">
      <div class="p-name">${p.name}</div>
      <div class="p-meta">${p.party === 'D' ? 'Democrat' : 'Republican'} Â· ${p.state} Â· ${p.chamber}</div>
    </div>
  `).join('');
  dropdown.classList.add('open');
}

function addPilot(key, name) {
  document.getElementById('pilot-dropdown').classList.remove('open');
  document.getElementById('pilot-search').value = '';
  alert(`To add ${name}, add their bioguide ID to the PILOTS dict in poll_trades.py and re-run the workflow.`);
}

document.addEventListener('click', e => {
  if (!document.getElementById('pilot-search').contains(e.target) && !document.getElementById('pilot-dropdown').contains(e.target)) {
    document.getElementById('pilot-dropdown').classList.remove('open');
  }
});

init();
</script>
</body>
</html>
